<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Delicious Bites</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Delicious Bites</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                  <li><a href="#" id="cart-btn"><i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <div class="container">
                <h2 class="page-heading">Contact us</h2>
                <div class="contact-card">
                    <form id="contact-form" action="https://usebasin.com/f/2ab7cc7496d1" method="post">
                        <input type="hidden" name="_redirect" value="success.html">
                        <input type="hidden" name="_subject" value="New contact request">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" placeholder="Enter your name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="6" placeholder="Write your message" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Submit</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="black-footer-bar"></div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('contact-form');
            if (!form) return;

            form.addEventListener('submit', async event => {
                event.preventDefault();

                const endpoint = form.action;
                const redirectUrl = 'success.html';
                const formData = new FormData(form);

                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        mode: 'cors',
                        body: formData
                    });

                    if (response.ok) {
                        window.location.href = redirectUrl;
                    } else {
                        alert('Submission failed. Please try again later.');
                        console.error('UseBasin submit error:', response.status, await response.text());
                    }
                } catch (error) {
                    alert('Submission failed. Please check your connection and try again.');
                    console.error('UseBasin submit exception:', error);
                }
            });
        });
    </script>
</body>
</html>
